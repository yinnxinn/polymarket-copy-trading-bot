# Polymarket Copy Trading Bot — Docker Compose
#
# Prerequisites (same as docs/GETTING_STARTED.md):
#   - .env with USER_ADDRESSES, PROXY_WALLET, PRIVATE_KEY (64 hex), RPC_URL,
#     CLOB_*, USDC_CONTRACT_ADDRESS, and either bundled Mongo or Atlas MONGO_URI
#   - Polygon wallet funded with USDC + POL/MATIC for gas
#
# Typical workflow:
#   1. cp .env.example .env   # then edit secrets (never commit .env)
#   2. docker compose run --rm bot node dist/scripts/healthCheck.js   # optional: verify config
#   3. docker compose up -d --build
#   4. docker compose logs -f bot
#
# MongoDB:
#   • Bundled MongoDB (this file): leave MONGO_URI unset in .env, or rely on default below.
#   • MongoDB Atlas only: set MONGO_URI in .env to your Atlas URI, then start bot without local mongo:
#       docker compose up -d --build --no-deps bot

name: polymarket-copy-trading-bot

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bot-net

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 45s
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Interpolation: host .env supplies MONGO_URI; if unset, use bundled Mongo service
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/polymarket_copytrading}
      # Leaderboard → high win-rate filter → copy trading pipeline
      LEADERBOARD_ENABLED: ${LEADERBOARD_ENABLED:-true}
      LEADERBOARD_ENRICH_PROFILES: ${LEADERBOARD_ENRICH_PROFILES:-true}
      LEADERBOARD_USE_PROFILE_SCORE: ${LEADERBOARD_USE_PROFILE_SCORE:-true}
      LEADERBOARD_PERSIST_TRACKING: ${LEADERBOARD_PERSIST_TRACKING:-true}
      LEADERBOARD_MIN_WIN_RATE: ${LEADERBOARD_MIN_WIN_RATE:-0.55}
      LEADERBOARD_REFRESH_MINUTES: ${LEADERBOARD_REFRESH_MINUTES:-30}
      LEADERBOARD_TOP_N: ${LEADERBOARD_TOP_N:-20}
      PREVIEW_MODE: ${PREVIEW_MODE:-false}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const mongoose=require('mongoose');(async()=>{if(process.env.LEADERBOARD_ENABLED!=='true'||process.env.LEADERBOARD_PERSIST_TRACKING==='false'){process.exit(0)};const uri=process.env.MONGO_URI;if(!uri){process.exit(1)};try{await mongoose.connect(uri);const count=await mongoose.connection.db.collection('leaderboardtradertrackings').countDocuments({});await mongoose.disconnect();process.exit(count>0?0:1)}catch(e){console.error(e);process.exit(1)}})();"
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - bot-net

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/dashboard/server.js"]
    depends_on:
      mongo:
        condition: service_healthy
      bot:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/polymarket_copytrading}
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: "3847"
    ports:
      - "127.0.0.1:3847:3847"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bot-net

networks:
  bot-net:
    name: polymarket-bot-net

volumes:
  mongo_data:
